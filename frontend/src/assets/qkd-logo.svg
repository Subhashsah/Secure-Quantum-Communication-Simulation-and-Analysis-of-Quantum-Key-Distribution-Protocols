<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Quantum Lock Icon -->
  <!-- Left photon -->
  <circle cx="30" cy="35" r="8" fill="url(#logoGrad)" filter="url(#logoGlow)"/>
  
  <!-- Right photon -->
  <circle cx="70" cy="55" r="8" fill="url(#logoGrad)" filter="url(#logoGlow)"/>
  
  <!-- Entanglement connection -->
  <path d="M 38 41 Q 50 48 62 49" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#logoGlow)"/>
  
  <!-- Lock hasp (curved top) -->
  <path d="M 28 50 Q 28 38 60 38 Q 75 38 75 50" 
        stroke="url(#logoGrad)" stroke-width="2.8" fill="none" 
        stroke-linecap="round" stroke-linejoin="round" filter="url(#logoGlow)"/>
  
  <!-- Lock body -->
  <rect x="25" y="50" width="50" height="20" rx="2" 
        fill="none" stroke="url(#logoGrad)" stroke-width="2.8" filter="url(#logoGlow)"/>
  
  <!-- Keyhole -->
  <g filter="url(#logoGlow)">
    <circle cx="50" cy="60" r="2.5" fill="#64c8ff"/>
    <circle cx="50" cy="68" r="1.8" fill="#64c8ff" opacity="0.7"/>
  </g>
</svg>
